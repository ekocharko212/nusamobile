<style>
  /* ============================================================
     NUSA mobile - Design tokens
     Palette: hutan tropis Kalimantan (forest) + emas (gold accent)
     konsisten dengan identitas visual ekosistem NUSA SuperApp
     ============================================================ */
  :root{
    --forest-950:#0A1710;
    --forest-900:#0E2B1F;
    --forest-800:#153A28;
    --forest-700:#1B4332;
    --forest-500:#2D6A4F;
    --forest-300:#5C9279;
    --gold-600:#A9821B;
    --gold-500:#C9A227;
    --gold-300:#E8C766;
    --gold-100:#F5E7BE;
    --cream-50:#FCFBF7;
    --cream-100:#F6F4EC;
    --cream-200:#EDE9DA;
    --ink-900:#16241D;

    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', monospace;

    --radius-lg:24px;
    --radius-md:16px;
    --radius-sm:10px;

    --bg:var(--cream-100);
    --bg-gradient: radial-gradient(circle at 18% -10%, #ffffff 0%, var(--cream-100) 45%), radial-gradient(circle at 90% 10%, rgba(201,162,39,.10) 0%, transparent 45%);
    --surface: rgba(255,255,255,.62);
    --surface-solid:#ffffff;
    --surface-border: rgba(27,67,50,.14);
    --text-primary: var(--ink-900);
    --text-secondary: rgba(22,36,29,.62);
    --text-on-accent:#ffffff;
    --accent: var(--forest-700);
    --accent-2: var(--gold-500);
    --shadow-soft: 0 10px 40px rgba(16,40,28,.10);
    --shadow-lift: 0 20px 60px rgba(16,40,28,.18);
  }

  [data-theme="dark"]{
    --bg: var(--forest-950);
    --bg-gradient: radial-gradient(circle at 15% -10%, rgba(45,106,79,.35) 0%, transparent 45%), radial-gradient(circle at 90% 5%, rgba(201,162,39,.14) 0%, transparent 45%);
    --surface: rgba(255,255,255,.05);
    --surface-solid: var(--forest-900);
    --surface-border: rgba(232,199,102,.14);
    --text-primary: var(--cream-50);
    --text-secondary: rgba(246,244,236,.62);
    --accent: var(--gold-300);
    --accent-2: var(--gold-500);
    --shadow-soft: 0 10px 40px rgba(0,0,0,.35);
    --shadow-lift: 0 20px 70px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background: var(--bg-gradient), var(--bg);
    color:var(--text-primary);
    min-height:100vh;
    transition: background .4s ease, color .4s ease;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:var(--font-display); font-weight:600; margin:0; letter-spacing:-.01em; }
  p{margin:0;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{ background: var(--accent-2); color:#16241D; }

  /* ---------- background gateway motif ---------- */
  .bg-gate{ position:fixed; inset:0; overflow:hidden; z-index:0; pointer-events:none;}
  .ring{ position:absolute; top:50%; left:50%; border-radius:50%; border:1px solid rgba(201,162,39,.18); transform:translate(-50%,-50%); animation: ringPulse 12s ease-in-out infinite;}
  .ring-1{ width:60vmax; height:60vmax; animation-delay:0s;}
  .ring-2{ width:85vmax; height:85vmax; border-color:rgba(45,106,79,.14); animation-delay:2s;}
  .ring-3{ width:110vmax; height:110vmax; border-color:rgba(201,162,39,.08); animation-delay:4s;}
  @keyframes ringPulse{
    0%,100%{ opacity:.5; transform:translate(-50%,-50%) scale(1);}
    50%{ opacity:1; transform:translate(-50%,-50%) scale(1.02);}
  }
  @media (prefers-reduced-motion: reduce){ .ring{animation:none;} }

  /* ---------- topbar ---------- */
  .topbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px;
    background: var(--surface);
    -webkit-backdrop-filter: blur(18px) saturate(140%); backdrop-filter: blur(18px) saturate(140%);
    border-bottom:1px solid var(--surface-border);
  }
  .topbar-left{display:flex; align-items:center; gap:10px;}
  .brand-icon{
    width:34px; height:34px; border-radius:9px; object-fit:cover;
    box-shadow:0 4px 12px rgba(16,40,28,.22), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .brand-text{display:flex; flex-direction:column; line-height:1.15;}
  .brand-text strong{ font-family:var(--font-display); font-size:16px; }
  .brand-text small{ color:var(--text-secondary); font-size:11px; letter-spacing:.03em; }
  .topbar-right{display:flex; align-items:center; gap:10px; position:relative;}

  .icon-btn{
    display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--surface-border); background:var(--surface); color:var(--text-primary);
    transition:.2s;
  }
  .icon-btn:hover{ background:var(--accent); color:var(--text-on-accent); }
  .icon-btn.active{ background:var(--accent); color:var(--text-on-accent); }

  .user-chip{
    display:flex; align-items:center; gap:10px; padding:6px 10px 6px 6px;
    border-radius:999px; border:1px solid var(--surface-border); background:var(--surface); cursor:pointer;
  }
  .user-avatar{
    width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, var(--forest-700), var(--forest-500));
    color:#fff; font-weight:700; font-size:13px; text-transform:uppercase;
  }
  .user-meta{ display:flex; flex-direction:column; line-height:1.1; }
  .user-meta strong{ font-size:13px; }
  .user-meta small{ font-size:11px; color:var(--text-secondary); }

  .user-menu{
    position:absolute; top:56px; right:0; width:220px;
    background:var(--surface-solid); border:1px solid var(--surface-border); border-radius:var(--radius-sm);
    box-shadow:var(--shadow-lift); overflow:hidden; z-index:60;
  }
  .user-menu-item{
    width:100%; display:flex; align-items:center; gap:10px; padding:12px 14px; background:none; border:none;
    color:var(--text-primary); font-size:13.5px; text-align:left;
  }
  .user-menu-item:hover{ background: rgba(201,162,39,.12); }

  /* ---------- layout / views ---------- */
  main#app{ position:relative; z-index:1; min-height:calc(100vh - 66px); }
  .view{ min-height:calc(100vh - 66px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 20px; }
  .view-dashboard, .view-admin{ display:block; }

  .glass-card{
    background:var(--surface); -webkit-backdrop-filter:blur(20px) saturate(150%); backdrop-filter:blur(20px) saturate(150%);
    border:1px solid var(--surface-border); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-soft);
  }

  /* loading */
  .loader-orb{
    width:64px; height:64px; border-radius:50%;
    border:3px solid rgba(201,162,39,.25); border-top-color:var(--accent-2);
    animation:spin 1s linear infinite; margin-bottom:18px;
  }
  .loader-orb.small{ width:40px; height:40px; margin:0 auto 14px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loader-text{ color:var(--text-secondary); font-size:14px; }

  /* no access / redirect */
  .noaccess-card, .redirect-card, .login-card{ padding:40px 36px; max-width:420px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px;}
  .noaccess-icon{ font-size:44px; color:var(--gold-500); margin-bottom:6px; }
  .noaccess-card h2, .redirect-card h2, .login-card h2{ font-size:21px; }
  .noaccess-card p, .login-card p{ color:var(--text-secondary); font-size:14px; line-height:1.5; }
  .view-login{ display:flex; align-items:center; justify-content:center; min-height:60vh; }
  .btn-google-signin{
    margin-top:14px; min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    gap:10px; background:#1f1f1f; color:#fff; border-radius:999px; padding:0 24px; height:44px;
    font-family:'Google Sans',Roboto,Inter,sans-serif; font-size:14px; font-weight:500;
    text-decoration:none; box-shadow:0 8px 24px rgba(0,0,0,.25); transition:.2s;
  }
  .btn-google-signin:hover{ transform:translateY(-1px); box-shadow:0 12px 30px rgba(0,0,0,.35); }
  .btn-google-signin-icon{ background:#fff; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
  .oauth-error-hint{ color:#c0392b !important; font-size:12.5px !important; }
  .link-btn{ background:none; border:none; padding:0; color:var(--gold-500); text-decoration:underline; font:inherit; cursor:pointer; }
  .noaccess-email{ font-family:var(--font-mono); font-size:12px; background:rgba(201,162,39,.12); padding:4px 10px; border-radius:8px; }

  .btn-primary{
    display:inline-flex; align-items:center; gap:8px; margin-top:10px;
    background:linear-gradient(135deg, var(--forest-700), var(--forest-500)); color:#fff;
    border:none; padding:12px 22px; border-radius:999px; font-weight:600; font-size:13.5px;
    box-shadow:0 8px 24px rgba(27,67,50,.3); transition:.2s; text-decoration:none;
  }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 12px 30px rgba(27,67,50,.4); }
  .btn-primary.sm{ padding:9px 16px; font-size:12.5px; margin-top:0; }
  .btn-ghost{
    background:none; border:1px solid var(--surface-border); color:var(--text-primary);
    padding:11px 20px; border-radius:999px; font-size:13.5px; font-weight:600;
  }

  /* ---------- launcher ---------- */
  .launcher-hero{ max-width:1100px; margin:20px auto 8px; padding:0 24px; }
  .launcher-hero h1{ font-size:clamp(26px,4vw,38px); }
  .launcher-hero h1 span{ color:var(--accent-2); }
  .launcher-hero p{ color:var(--text-secondary); margin-top:6px; font-size:14.5px; }

  .launcher-toolbar{
    max-width:1100px; margin:22px auto; padding:0 24px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .search-box{
    flex:1; min-width:220px; display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--surface-border); border-radius:999px;
    padding:10px 16px; color:var(--text-secondary);
  }
  .search-box input{ border:none; background:none; outline:none; color:var(--text-primary); font-size:13.5px; width:100%; }
  .category-pills{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    padding:8px 14px; border-radius:999px; border:1px solid var(--surface-border); background:var(--surface);
    font-size:12.5px; font-weight:600; color:var(--text-secondary);
  }
  .pill.active{ background:var(--accent); color:var(--text-on-accent); border-color:transparent; }
  .view-toggle{ display:flex; gap:6px; }

  .app-grid{
    max-width:1100px; margin:0 auto; padding:0 24px 60px;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:18px;
  }
  .app-grid.list-mode{ grid-template-columns:1fr; }

  .app-card{
    position:relative; overflow:hidden;
    background:var(--surface); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
    border:1px solid var(--surface-border); border-radius:var(--radius-md);
    padding:22px; display:flex; flex-direction:column; gap:10px;
    transition:transform .25s ease, box-shadow .25s ease;
    text-decoration:none; color:var(--text-primary);
  }
  .app-card:hover{ transform:translateY(-4px); box-shadow:var(--shadow-lift); }
  .app-card .app-glow{
    position:absolute; inset:-40% -40% auto auto; width:140px; height:140px; border-radius:50%;
    filter:blur(40px); opacity:.35; z-index:0;
  }
  .app-card-top{ display:flex; align-items:center; justify-content:space-between; z-index:1;}
  .app-icon{
    width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:22px;
  }
  .app-card h3{ font-size:16px; z-index:1; }
  .app-card .app-desc{ font-size:12.5px; color:var(--text-secondary); flex:1; z-index:1; line-height:1.5; }
  .app-card .app-cat{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); z-index:1;}
  .app-card-btn{
    z-index:1; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:9px; border-radius:10px; background:rgba(27,67,50,.08); font-weight:600; font-size:12.5px;
  }
  [data-theme="dark"] .app-card-btn{ background:rgba(232,199,102,.1); }

  .app-grid.list-mode .app-card{ flex-direction:row; align-items:center; }
  .app-grid.list-mode .app-card-top{ flex-direction:column; gap:6px; }
  .app-grid.list-mode .app-desc{ display:none; }
  .app-grid.list-mode .app-card-btn{ margin-top:0; padding:9px 16px; }

  .empty-state{ text-align:center; color:var(--text-secondary); padding:40px; }

  /* ---------- admin ---------- */
  .admin-shell{ max-width:1300px; margin:0 auto; padding:24px; display:grid; grid-template-columns:220px 1fr; gap:22px; }
  .admin-nav{ display:flex; flex-direction:column; gap:6px; position:sticky; top:90px; align-self:start; }
  .admin-nav-item{
    display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:12px; border:none;
    background:transparent; color:var(--text-secondary); font-size:13.5px; font-weight:600; text-align:left;
  }
  .admin-nav-item:hover{ background:var(--surface); }
  .admin-nav-item.active{ background:var(--accent); color:var(--text-on-accent); }
  .admin-tab{ display:none; }
  .admin-tab.active{ display:block; }

  .stat-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:20px; }
  .stat-card{
    background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-md);
    padding:18px 20px;
  }
  .stat-card .stat-label{ font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; }
  .stat-card .stat-value{ font-family:var(--font-display); font-size:30px; margin-top:4px; }

  .chart-row{ display:grid; grid-template-columns:1.4fr 1fr; gap:16px; }
  .chart-card{ padding:20px; }
  .chart-card h3{ font-size:14px; margin-bottom:14px; }
  .top-apps-list{ display:flex; flex-direction:column; gap:10px; }
  .top-app-row{ display:flex; align-items:center; justify-content:space-between; font-size:13px; padding:8px 0; border-bottom:1px solid var(--surface-border); }
  .top-app-row:last-child{ border-bottom:none; }
  .top-app-badge{ font-family:var(--font-mono); background:rgba(201,162,39,.15); padding:2px 8px; border-radius:6px; font-size:11.5px; }

  .table-toolbar{ display:flex; gap:12px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .table-wrap{ overflow-x:auto; background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-md); }
  .data-table{ width:100%; border-collapse:collapse; font-size:13px; }
  .data-table th{ text-align:left; padding:12px 16px; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-secondary); border-bottom:1px solid var(--surface-border); }
  .data-table td{ padding:12px 16px; border-bottom:1px solid var(--surface-border); vertical-align:middle; }
  .data-table tr:last-child td{ border-bottom:none; }
  .badge{ padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; }
  .badge.aktif{ background:rgba(45,106,79,.15); color:var(--forest-500); }
  .badge.nonaktif{ background:rgba(201,80,60,.15); color:#C9503C; }
  .table-btn{ border:1px solid var(--surface-border); background:none; color:var(--text-primary); padding:6px 12px; border-radius:8px; font-size:12px; margin-right:6px; }
  .table-btn:hover{ background:var(--accent); color:var(--text-on-accent); }
  .tab-hint{ color:var(--text-secondary); font-size:13px; margin-bottom:14px; }

  /* ---------- modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(10,23,16,.5); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal{ width:100%; max-width:440px; padding:28px; display:flex; flex-direction:column; gap:12px; max-height:88vh; overflow-y:auto;}
  .modal h3{ font-size:18px; margin-bottom:6px; }
  .modal label{ display:flex; flex-direction:column; gap:6px; font-size:12.5px; color:var(--text-secondary); font-weight:600; }
  .modal input, .modal select, .modal textarea{
    border:1px solid var(--surface-border); border-radius:10px; padding:10px 12px; font-size:13.5px;
    background:var(--surface-solid); color:var(--text-primary); outline:none;
  }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:8px; }

  /* toast */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--forest-900); color:#fff; padding:12px 22px; border-radius:999px;
    font-size:13px; box-shadow:var(--shadow-lift); z-index:200;
  }
  .toast.error{ background:#9B3B2C; }

  [hidden]{ display:none !important; }

  @media (max-width:820px){
    .admin-shell{ grid-template-columns:1fr; }
    .admin-nav{ flex-direction:row; overflow-x:auto; position:static; }
    .chart-row{ grid-template-columns:1fr; }
  }

  /* ============================================================
     SPLASH GATEWAY — "NUSA mobile"
     Mobile-only entry screen shown before the automatic
     Google Sign-In verification kicks in.
     ============================================================ */
  .view-splash{
    display:none;
    min-height:100vh; width:100%;
    padding:56px 20px 40px;
    background:
      radial-gradient(circle at 22% -8%, rgba(232,199,102,.22) 0%, transparent 55%),
      radial-gradient(circle at 88% 92%, rgba(45,106,79,.38) 0%, transparent 55%),
      linear-gradient(165deg, var(--forest-950) 0%, var(--forest-800) 55%, var(--forest-700) 100%);
    color:#fff;
  }
  .splash-shell{
    width:100%; max-width:380px; margin:0 auto;
    display:flex; flex-direction:column; align-items:center; gap:30px;
  }
  .splash-brand{ display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .splash-brand-icon{
    width:68px; height:68px; object-fit:cover;
    border-radius:20px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16);
    box-shadow:0 10px 26px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
  }
  .splash-brand h1{ font-family:var(--font-display); font-size:30px; font-weight:700; color:#fff; letter-spacing:-.01em; }
  .splash-brand h1 em{ font-style:italic; font-weight:500; color:var(--gold-300); margin-left:3px; }

  .splash-card{
    width:100%;
    background:rgba(255,255,255,.06);
    -webkit-backdrop-filter:blur(22px) saturate(160%); backdrop-filter:blur(22px) saturate(160%);
    border:1px solid rgba(255,255,255,.14);
    border-radius:var(--radius-lg);
    overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .splash-row{
    width:100%; display:flex; align-items:center; gap:14px;
    padding:18px; background:none; border:none; border-bottom:1px solid rgba(255,255,255,.09);
    color:#fff; text-align:left; text-decoration:none; transition:.2s ease; font-family:inherit;
  }
  .splash-row:last-child{ border-bottom:none; }
  .splash-row:hover{ background:rgba(255,255,255,.07); }
  .splash-row:active{ transform:scale(.99); }
  .splash-row-icon{
    position:relative; overflow:hidden;
    width:42px; height:42px; min-width:42px; border-radius:13px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:20px;
    box-shadow:0 8px 18px rgba(0,0,0,.28);
  }
  .splash-row-icon::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(160deg, rgba(255,255,255,.4), rgba(255,255,255,0) 60%);
  }
  .splash-row-icon .material-icons-round{ position:relative; z-index:1; }
  .splash-row-icon.mnusa{ background:linear-gradient(135deg, var(--gold-500), var(--gold-600)); }
  .splash-row-icon.kliknusa{ background:linear-gradient(135deg, var(--forest-500), var(--forest-700)); }
  .splash-row-icon.infonusa{ background:linear-gradient(135deg, #3E7CB1, #274B6E); }
  .splash-row-text{ flex:1; display:flex; flex-direction:column; gap:2px; }
  .splash-row-text strong{ font-size:14.5px; font-weight:700; letter-spacing:.01em; }
  .splash-row-text small{ font-size:11.5px; color:rgba(255,255,255,.58); }
  .splash-row-arrow{ color:rgba(255,255,255,.38); font-size:20px; }

  .splash-foot{ font-size:11px; color:rgba(255,255,255,.45); text-align:center; line-height:1.6; max-width:300px; }

  @media (min-width:821px){
    .view-splash{ display:none !important; }
  }
  @media (max-width:820px){
    .view-splash[hidden]{ display:none; }
    .view-splash:not([hidden]){ display:flex; align-items:flex-start; justify-content:center; }
  }

  /* ============================================================
     PREMIUM ICON GRID — mobile only (desktop keeps the card grid)
     ============================================================ */
  @media (max-width:640px){
    .launcher-toolbar .view-toggle{ display:none; }

    .app-grid,
    .app-grid.list-mode{
      grid-template-columns:repeat(4, 1fr);
      gap:20px 8px;
      padding:4px 16px 48px;
    }
    .app-grid.list-mode .app-card{ flex-direction:column; }

    .app-card{
      background:none; -webkit-backdrop-filter:none; backdrop-filter:none; border:none; box-shadow:none;
      padding:0; border-radius:0; gap:8px;
      align-items:center; text-align:center;
      transition:transform .18s ease;
    }
    .app-card:active{ transform:scale(.94); }
